name: release-please

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Branch to run release-please on (main or next)"
        required: true
        default: "main"
        type: choice
        options:
          - main
          - next
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          release-type: python
          package-name: albert
          target-branch: ${{ inputs.target_branch || github.ref_name }}
